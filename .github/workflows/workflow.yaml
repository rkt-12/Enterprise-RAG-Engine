name: RAG Evaluation CI/CD

on:
  pull_request:
    branches: [ "main" ]

jobs:
  evaluate-rag:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Install your main app dependencies
        pip install -r requirements.txt
        
        # 2. Install testing-specific libraries (httpx is required for FastAPI TestClient)
        pip install pytest httpx pandas ragas
        
    - name: Run Ragas Regression Gate
      env:
        # Pulls your API key securely from GitHub Repository Secrets
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        pytest test_rag.py -v -s